<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dotsB3" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#e3e2db"/>
    </pattern>
    <filter id="softB3" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="arrBlueB3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a78d6"/>
    </marker>
    <marker id="arrGreyB3" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6f6d67"/>
    </marker>
  </defs>

  <rect width="1200" height="675" rx="24" fill="#fcfcfb"/>
  <rect width="1200" height="675" rx="24" fill="url(#dotsB3)"/>
  <rect x="1" y="1" width="1198" height="673" rx="23" fill="none" stroke="#0b0b0b" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="48" y="66" fill="#898781" font-size="16" letter-spacing="3">FIG. 03 — CONTRACT BEFORE CODE</text>

  <!-- contract block -->
  <rect x="320" y="104" width="560" height="216" rx="16" fill="#2a78d6" fill-opacity="0.15" filter="url(#softB3)"/>
  <rect x="320" y="104" width="560" height="216" rx="14" fill="#eef5fd" stroke="#2a78d6" stroke-width="2"/>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="17" fill="#1c5cab">
    <text x="352" y="144" fill="#0d366b">//@contract: StartCaptureRoute.handle</text>
    <text x="352" y="176">//@&#160;&#160;pre: command.value &gt; 0</text>
    <text x="352" y="208">//@&#160;&#160;post: result.captureId == command.id</text>
    <text x="352" y="240">//@&#160;&#160;calls: [telemetryApi.start]</text>
    <text x="352" y="272">//@&#160;&#160;raises: PermanentException</text>
    <text x="352" y="304">//@&#160;&#160;assigns: []</text>
  </g>
  <rect x="480" y="89" width="240" height="30" rx="15" fill="#fcfcfb" stroke="#2a78d6" stroke-width="1.5"/>
  <text x="600" y="109" fill="#1c5cab" font-size="15" letter-spacing="1" text-anchor="middle">single source of truth</text>

  <!-- two independent realizations -->
  <path d="M 520 322 C 520 374, 320 352, 320 396" fill="none" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB3)"/>
  <path d="M 680 322 C 680 374, 880 352, 880 396" fill="none" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB3)"/>
  <text x="408" y="366" fill="#6f6d67" font-size="15" text-anchor="end">generates</text>
  <text x="792" y="366" fill="#6f6d67" font-size="15">asserts</text>

  <rect x="180" y="400" width="280" height="84" rx="12" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="320" y="451" fill="#1a1a19" font-size="22" text-anchor="middle">implementation</text>

  <rect x="740" y="400" width="280" height="84" rx="12" fill="#f4f3f0" stroke="#199e70" stroke-width="1.5"/>
  <text x="880" y="451" fill="#0e7d54" font-size="22" text-anchor="middle">tests</text>

  <line x1="470" y1="442" x2="730" y2="442" stroke="#6f6d67" stroke-width="1.8" stroke-dasharray="6 6" marker-start="url(#arrGreyB3)" marker-end="url(#arrGreyB3)"/>
  <text x="600" y="426" fill="#6f6d67" font-size="15.5" text-anchor="middle">must agree</text>
  <text x="600" y="468" fill="#6f6d67" font-size="15.5" text-anchor="middle">derived independently</text>

  <text x="600" y="556" fill="#52514e" font-size="20" text-anchor="middle">For a bug to slip through, two mistakes must happen — in different directions, and in agreement.</text>

  <!-- the old loop, retired -->
  <g opacity="0.8">
    <rect x="80" y="606" width="76" height="38" rx="9" fill="#f7f6f3" stroke="#b5b3ab"/>
    <text x="118" y="631" fill="#6f6d67" font-size="15" text-anchor="middle">code</text>
    <rect x="216" y="606" width="76" height="38" rx="9" fill="#f7f6f3" stroke="#b5b3ab"/>
    <text x="254" y="631" fill="#6f6d67" font-size="15" text-anchor="middle">test</text>
    <path d="M 158 613 C 174 601, 198 601, 214 613" fill="none" stroke="#b5b3ab" stroke-width="1.6" marker-end="url(#arrGreyB3)"/>
    <path d="M 214 637 C 198 649, 174 649, 158 637" fill="none" stroke="#b5b3ab" stroke-width="1.6" marker-end="url(#arrGreyB3)"/>
    <line x1="98" y1="652" x2="276" y2="596" stroke="#d03b3b" stroke-width="2.4"/>
    <text x="320" y="631" fill="#6f6d67" font-size="15">the old loop: the examiner studied under the examinee</text>
  </g>
</svg>
