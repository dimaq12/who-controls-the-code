<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dots6" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#222220"/>
    </pattern>
    <filter id="glow6" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <marker id="arrGrey6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c3c2b7"/>
    </marker>
    <marker id="arrRed6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#e66767"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="20" fill="#161615"/>
  <rect width="1200" height="560" rx="20" fill="url(#dots6)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="48" y="58" fill="#898781" font-size="13" letter-spacing="3">FIG. 06 — EXACTLY ONE WRITE PATH</text>

  <!-- blocked direct write -->
  <path d="M 135 268 C 135 150, 880 130, 1030 236" fill="none" stroke="#e66767" stroke-width="1.6" stroke-dasharray="7 6" stroke-opacity="0.85" marker-end="url(#arrRed6)"/>
  <circle cx="576" cy="168" r="16" fill="#161615"/>
  <g stroke="#e66767" stroke-width="2.5" stroke-linecap="round">
    <line x1="566" y1="158" x2="586" y2="178"/>
    <line x1="586" y1="158" x2="566" y2="178"/>
  </g>
  <text x="576" y="138" fill="#e66767" font-size="13" text-anchor="middle">no direct write</text>

  <!-- agent -->
  <rect x="70" y="272" width="130" height="56" rx="10" fill="#1f1f1e" stroke="#6b6a66"/>
  <text x="135" y="306" fill="#eceae4" font-size="15" text-anchor="middle">agent</text>

  <line x1="200" y1="300" x2="244" y2="300" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey6)"/>

  <!-- proposal -->
  <rect x="250" y="262" width="190" height="76" rx="10" fill="#1f1f1e" stroke="#6b6a66"/>
  <text x="266" y="292" fill="#eceae4" font-size="14">proposal</text>
  <text x="266" y="316" fill="#898781" font-size="11.5" font-family="ui-monospace, Menlo, Consolas, monospace">grounds: REQ-12 §3</text>

  <line x1="440" y1="300" x2="484" y2="300" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey6)"/>

  <!-- mechanical checks -->
  <g fill="#3a3a37">
    <rect x="492" y="258" width="8" height="84" rx="4"/>
    <rect x="508" y="248" width="8" height="104" rx="4"/>
    <rect x="524" y="258" width="8" height="84" rx="4"/>
  </g>
  <text x="516" y="378" fill="#898781" font-size="13" text-anchor="middle">mechanical checks</text>

  <line x1="536" y1="300" x2="574" y2="300" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey6)"/>

  <!-- staging -->
  <rect x="580" y="246" width="200" height="108" rx="12" fill="#1d1c26" stroke="#9085e9" stroke-dasharray="6 5"/>
  <text x="680" y="272" fill="#b3aaf2" font-size="13" text-anchor="middle">staging copy</text>
  <rect x="610" y="288" width="140" height="40" rx="6" fill="#1f1f1e" stroke="#3a3a37"/>
  <text x="680" y="313" fill="#a3a29b" font-size="11.5" font-family="ui-monospace, Menlo, Consolas, monospace" text-anchor="middle">//@contract: …</text>

  <line x1="780" y1="300" x2="824" y2="300" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey6)"/>

  <!-- human decision -->
  <rect x="830" y="272" width="170" height="56" rx="28" fill="#1f1f1e" stroke="#c3c2b7"/>
  <circle cx="866" cy="292" r="8" fill="none" stroke="#eceae4" stroke-width="1.8"/>
  <path d="M 850 316 Q 866 300 882 316" fill="none" stroke="#eceae4" stroke-width="1.8" stroke-linecap="round"/>
  <text x="906" y="296" fill="#eceae4" font-size="14">human</text>
  <text x="906" y="314" fill="#898781" font-size="11.5">accept / reject</text>

  <line x1="1000" y1="300" x2="1044" y2="300" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey6)"/>

  <!-- contracts vault -->
  <rect x="1050" y="250" width="110" height="100" rx="14" fill="#3987e5" fill-opacity="0.25" filter="url(#glow6)"/>
  <rect x="1050" y="250" width="110" height="100" rx="14" fill="#141a26" stroke="#3987e5" stroke-width="1.8"/>
  <path d="M 1092 296 v -12 a 13 13 0 0 1 26 0 v 12" fill="none" stroke="#7fb2ef" stroke-width="3"/>
  <rect x="1085" y="296" width="40" height="30" rx="6" fill="#182233" stroke="#7fb2ef" stroke-width="2"/>
  <text x="1105" y="378" fill="#9cc3f0" font-size="14" text-anchor="middle">contracts</text>

  <text x="600" y="470" fill="#c3c2b7" font-size="15" text-anchor="middle">The agent proposes something provable; the human decides. The machine has no way to change the system silently.</text>
</svg>
