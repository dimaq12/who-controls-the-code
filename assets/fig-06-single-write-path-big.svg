<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dotsB6" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#e3e2db"/>
    </pattern>
    <filter id="glowB6" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <marker id="arrGreyB6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
    <marker id="arrRedB6" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d03b3b"/>
    </marker>
  </defs>

  <rect width="1200" height="675" rx="24" fill="#fcfcfb"/>
  <rect width="1200" height="675" rx="24" fill="url(#dotsB6)"/>
  <rect x="1" y="1" width="1198" height="673" rx="23" fill="none" stroke="#0b0b0b" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="48" y="66" fill="#898781" font-size="16" letter-spacing="3">FIG. 06 — EXACTLY ONE WRITE PATH</text>

  <!-- blocked direct write -->
  <path d="M 135 318 C 135 170, 880 150, 1046 288" fill="none" stroke="#d03b3b" stroke-width="2" stroke-dasharray="8 7" stroke-opacity="0.85" marker-end="url(#arrRedB6)"/>
  <circle cx="528" cy="196" r="20" fill="#fcfcfb"/>
  <g stroke="#d03b3b" stroke-width="3" stroke-linecap="round">
    <line x1="516" y1="184" x2="540" y2="208"/>
    <line x1="540" y1="184" x2="516" y2="208"/>
  </g>
  <text x="528" y="160" fill="#d03b3b" font-size="16" text-anchor="middle">no direct write</text>

  <!-- agent -->
  <rect x="60" y="322" width="150" height="76" rx="12" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="135" y="368" fill="#1a1a19" font-size="22" text-anchor="middle">agent</text>

  <line x1="210" y1="360" x2="246" y2="360" stroke="#52514e" stroke-width="2" marker-end="url(#arrGreyB6)"/>

  <!-- proposal -->
  <rect x="252" y="308" width="200" height="104" rx="12" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="274" y="352" fill="#1a1a19" font-size="19">proposal</text>
  <text x="274" y="386" fill="#6f6d67" font-size="14" font-family="ui-monospace, Menlo, Consolas, monospace">grounds: REQ-12 §3</text>

  <line x1="452" y1="360" x2="488" y2="360" stroke="#52514e" stroke-width="2" marker-end="url(#arrGreyB6)"/>

  <!-- mechanical checks -->
  <g fill="#b5b3ab">
    <rect x="494" y="310" width="10" height="116" rx="5"/>
    <rect x="514" y="296" width="10" height="144" rx="5"/>
    <rect x="534" y="310" width="10" height="116" rx="5"/>
  </g>
  <text x="519" y="470" fill="#6f6d67" font-size="15.5" text-anchor="middle">mechanical checks</text>

  <line x1="548" y1="360" x2="584" y2="360" stroke="#52514e" stroke-width="2" marker-end="url(#arrGreyB6)"/>

  <!-- staging -->
  <rect x="590" y="290" width="210" height="150" rx="14" fill="#f1effa" stroke="#5b4dbe" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="695" y="322" fill="#4a3aa7" font-size="16" text-anchor="middle">staging copy</text>
  <rect x="620" y="340" width="150" height="54" rx="8" fill="#f4f3f0" stroke="#d0cec6" stroke-width="1.5"/>
  <text x="695" y="373" fill="#6f6d67" font-size="14" font-family="ui-monospace, Menlo, Consolas, monospace" text-anchor="middle">//@contract: …</text>

  <line x1="800" y1="360" x2="836" y2="360" stroke="#52514e" stroke-width="2" marker-end="url(#arrGreyB6)"/>

  <!-- human decision -->
  <rect x="842" y="322" width="170" height="76" rx="38" fill="#f4f3f0" stroke="#52514e" stroke-width="1.5"/>
  <circle cx="878" cy="350" r="10" fill="none" stroke="#1a1a19" stroke-width="2.2"/>
  <path d="M 858 382 Q 878 360 898 382" fill="none" stroke="#1a1a19" stroke-width="2.2" stroke-linecap="round"/>
  <text x="950" y="356" fill="#1a1a19" font-size="18" text-anchor="middle">human</text>
  <text x="950" y="380" fill="#6f6d67" font-size="13.5" text-anchor="middle">accept / reject</text>

  <line x1="1012" y1="360" x2="1040" y2="360" stroke="#52514e" stroke-width="2" marker-end="url(#arrGreyB6)"/>

  <!-- contracts vault -->
  <rect x="1046" y="300" width="120" height="120" rx="16" fill="#2a78d6" fill-opacity="0.15" filter="url(#glowB6)"/>
  <rect x="1046" y="300" width="120" height="120" rx="16" fill="#eef5fd" stroke="#2a78d6" stroke-width="2.2"/>
  <path d="M 1092 356 v -14 a 14 14 0 0 1 28 0 v 14" fill="none" stroke="#1c5cab" stroke-width="3.5"/>
  <rect x="1084" y="356" width="44" height="36" rx="7" fill="#e3eefa" stroke="#1c5cab" stroke-width="2.2"/>
  <text x="1106" y="452" fill="#1c5cab" font-size="17" text-anchor="middle">contracts</text>

  <text x="600" y="600" fill="#52514e" font-size="20" text-anchor="middle">The agent proposes something provable; the human decides. The machine cannot change the system silently.</text>
</svg>
