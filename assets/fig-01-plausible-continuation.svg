<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#222220"/>
    </pattern>
    <marker id="arrGrey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c3c2b7"/>
    </marker>
  </defs>

  <rect width="1200" height="560" rx="20" fill="#161615"/>
  <rect width="1200" height="560" rx="20" fill="url(#dots)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="48" y="58" fill="#898781" font-size="13" letter-spacing="3">FIG. 01 — THE MOST PLAUSIBLE CONTINUATION</text>

  <!-- context that did not fit the window -->
  <g font-size="14" fill="#898781">
    <g transform="rotate(-2 192 163)">
      <rect x="66" y="140" width="252" height="46" rx="10" fill="#191918" stroke="#4a4a46" stroke-dasharray="5 4"/>
      <text x="82" y="169">ADR-014 · layer boundaries</text>
    </g>
    <g transform="rotate(1.6 224 235)">
      <rect x="98" y="212" width="252" height="46" rx="10" fill="#191918" stroke="#4a4a46" stroke-dasharray="5 4"/>
      <text x="114" y="241">published wire schema</text>
    </g>
    <g transform="rotate(-1.2 196 307)">
      <rect x="70" y="284" width="252" height="46" rx="10" fill="#191918" stroke="#4a4a46" stroke-dasharray="5 4"/>
      <text x="86" y="313">the rule that lives in a test</text>
    </g>
    <g transform="rotate(2 226 379)">
      <rect x="100" y="356" width="252" height="46" rx="10" fill="#191918" stroke="#4a4a46" stroke-dasharray="5 4"/>
      <text x="116" y="385">developer's memory (offline)</text>
    </g>
  </g>
  <text x="70" y="452" fill="#898781" font-size="13.5" font-style="italic">outside the window — must be reinvented</text>

  <!-- context window -->
  <text x="555" y="116" fill="#898781" font-size="12" letter-spacing="2" text-anchor="middle">CONTEXT WINDOW</text>
  <rect x="430" y="126" width="250" height="330" rx="14" fill="#181a1e" stroke="#3987e5" stroke-opacity="0.85" stroke-width="1.5"/>
  <g>
    <rect x="450" y="150" width="210" height="46" rx="8" fill="#1f1f1e" stroke="#3a3a37"/>
    <rect x="450" y="150" width="4" height="46" rx="2" fill="#3987e5"/>
    <text x="466" y="179" fill="#eceae4" font-size="14">task description</text>

    <rect x="450" y="212" width="210" height="46" rx="8" fill="#1f1f1e" stroke="#3a3a37"/>
    <rect x="450" y="212" width="4" height="46" rx="2" fill="#3987e5"/>
    <text x="466" y="241" fill="#eceae4" font-size="13" font-family="ui-monospace, Menlo, Consolas, monospace">StartCaptureRoute.kt</text>

    <rect x="450" y="274" width="210" height="46" rx="8" fill="#1f1f1e" stroke="#3a3a37"/>
    <rect x="450" y="274" width="4" height="46" rx="2" fill="#3987e5"/>
    <text x="466" y="303" fill="#eceae4" font-size="13" font-family="ui-monospace, Menlo, Consolas, monospace">CaptureProducer.kt</text>

    <rect x="450" y="336" width="210" height="46" rx="8" fill="#1f1f1e" stroke="#3a3a37"/>
    <rect x="450" y="336" width="4" height="46" rx="2" fill="#3987e5"/>
    <text x="466" y="365" fill="#eceae4" font-size="14">+ 3 more files</text>
  </g>
  <text x="555" y="480" fill="#898781" font-size="13.5" text-anchor="middle" font-style="italic">what fits, goes in</text>

  <!-- arrow -->
  <line x1="692" y1="291" x2="748" y2="291" stroke="#c3c2b7" stroke-width="1.6" marker-end="url(#arrGrey)"/>
  <text x="721" y="277" fill="#898781" font-size="12" text-anchor="middle">generate</text>

  <!-- generated code -->
  <rect x="760" y="110" width="392" height="350" rx="12" fill="#121211" stroke="#3a3a37"/>
  <text x="784" y="140" fill="#898781" font-size="13" font-family="ui-monospace, Menlo, Consolas, monospace">StartCaptureListener.kt</text>
  <line x1="761" y1="154" x2="1151" y2="154" stroke="#2c2c2a"/>

  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14.5" fill="#c3c2b7" xml:space="preserve">
    <text x="784" y="192">fun handle(cmd: StartCapture) {</text>
    <text x="784" y="222">&#160;&#160;validate(cmd)</text>
    <text x="784" y="252">&#160;&#160;val res = provider.call(cmd)</text>
    <rect x="772" y="264" width="368" height="28" rx="6" fill="#d95926" fill-opacity="0.13" stroke="#d95926" stroke-opacity="0.8"/>
    <text x="784" y="283" fill="#eb8a5c">&#160;&#160;retry(3) { provider.call(cmd) }</text>
    <text x="784" y="313">&#160;&#160;emit(CaptureStarted(res.id))</text>
    <text x="784" y="343">}</text>
  </g>

  <rect x="772" y="382" width="3" height="46" fill="#d95926" fill-opacity="0.85"/>
  <text x="788" y="399" fill="#e8946b" font-size="13.5">plausible — and never licensed:</text>
  <text x="788" y="419" fill="#e8946b" font-size="13.5">the operation is not idempotent</text>

  <text x="48" y="524" fill="#c3c2b7" font-size="15">Everything missing from the window is filled in the way the model was trained to: with the most plausible continuation.</text>
</svg>
