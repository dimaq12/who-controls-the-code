<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dotsB2" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#e3e2db"/>
    </pattern>
    <filter id="fogB2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <marker id="arrBlueB2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2a78d6"/>
    </marker>
    <linearGradient id="fadeB2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a8a69e" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#a8a69e" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#a8a69e" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" rx="24" fill="#fcfcfb"/>
  <rect width="1200" height="675" rx="24" fill="url(#dotsB2)"/>
  <rect x="1" y="1" width="1198" height="673" rx="23" fill="none" stroke="#0b0b0b" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="48" y="66" fill="#898781" font-size="16" letter-spacing="3">FIG. 02 — PLAUSIBILITY IS NOT PROVENANCE</text>

  <!-- what we have -->
  <text x="48" y="130" fill="#6f6d67" font-size="15" letter-spacing="2">WHAT WE HAVE</text>

  <rect x="70" y="168" width="230" height="72" rx="12" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="185" y="212" fill="#1a1a19" font-size="21" text-anchor="middle">human intent</text>

  <line x1="300" y1="204" x2="832" y2="204" stroke="url(#fadeB2)" stroke-width="2" stroke-dasharray="7 7"/>

  <g filter="url(#fogB2)">
    <ellipse cx="430" cy="204" rx="85" ry="42" fill="#dddbd3" fill-opacity="0.8"/>
    <ellipse cx="565" cy="196" rx="95" ry="46" fill="#dddbd3" fill-opacity="0.8"/>
    <ellipse cx="700" cy="208" rx="85" ry="42" fill="#dddbd3" fill-opacity="0.8"/>
  </g>
  <g fill="#6f6d67">
    <text x="382" y="198" font-size="22">?</text>
    <text x="462" y="226" font-size="27">?</text>
    <text x="552" y="188" font-size="21">?</text>
    <text x="638" y="220" font-size="26">?</text>
    <text x="722" y="194" font-size="21">?</text>
  </g>

  <rect x="836" y="168" width="250" height="72" rx="12" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="961" y="212" fill="#1a1a19" font-size="21" text-anchor="middle">generated code</text>

  <rect x="836" y="262" width="150" height="38" rx="19" fill="#199e70" fill-opacity="0.14" stroke="#199e70" stroke-width="1.5"/>
  <text x="911" y="287" fill="#0e7d54" font-size="16" text-anchor="middle">tests pass ✓</text>
  <text x="836" y="330" fill="#6f6d67" font-size="16">— written from the code</text>

  <line x1="48" y1="368" x2="1152" y2="368" stroke="#dddbd3" stroke-width="1.5"/>

  <!-- what control requires -->
  <text x="48" y="418" fill="#6f6d67" font-size="15" letter-spacing="2">WHAT CONTROL REQUIRES</text>

  <g font-size="19" text-anchor="middle">
    <rect x="54" y="448" width="196" height="80" rx="12" fill="#e3eefa" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="152" y="495" fill="#164a86">requirement</text>

    <line x1="250" y1="488" x2="272" y2="488" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB2)"/>

    <rect x="278" y="448" width="196" height="80" rx="12" fill="#e3eefa" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="376" y="495" fill="#164a86">architectural rule</text>

    <line x1="474" y1="488" x2="496" y2="488" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB2)"/>

    <rect x="502" y="448" width="196" height="80" rx="12" fill="#e3eefa" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="600" y="495" fill="#164a86">contract</text>

    <line x1="698" y1="488" x2="720" y2="488" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB2)"/>

    <rect x="726" y="448" width="196" height="80" rx="12" fill="#e3eefa" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="824" y="495" fill="#164a86">implementation</text>

    <line x1="922" y1="488" x2="944" y2="488" stroke="#2a78d6" stroke-width="2.2" marker-end="url(#arrBlueB2)"/>

    <rect x="950" y="448" width="196" height="80" rx="12" fill="#e3eefa" stroke="#2a78d6" stroke-width="1.5"/>
    <text x="1048" y="495" fill="#164a86">test</text>
  </g>

  <text x="600" y="614" fill="#52514e" font-size="20" text-anchor="middle">Every element can answer: why do I exist — and which check proves me right.</text>
</svg>
