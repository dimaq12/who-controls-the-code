<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dotsB4" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="1.2" cy="1.2" r="1.2" fill="#e3e2db"/>
    </pattern>
    <pattern id="hatchB4" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#2a78d6" stroke-opacity="0.16" stroke-width="1.6"/>
    </pattern>
    <filter id="glowB4" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <marker id="arrGreyB4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#52514e"/>
    </marker>
  </defs>

  <rect width="1200" height="675" rx="24" fill="#fcfcfb"/>
  <rect width="1200" height="675" rx="24" fill="url(#dotsB4)"/>
  <rect x="1" y="1" width="1198" height="673" rx="23" fill="none" stroke="#0b0b0b" stroke-opacity="0.12" stroke-width="1.5"/>

  <text x="48" y="66" fill="#898781" font-size="16" letter-spacing="3">FIG. 04 — HONESTY OVER COMPLETENESS</text>

  <!-- left: the stop protocol -->
  <text x="56" y="114" fill="#6f6d67" font-size="14" letter-spacing="1.5">WHEN CONTRACTS RUN OUT: STOP, RECORD, CITE</text>

  <rect x="56" y="134" width="350" height="200" rx="14" fill="#eef5fd"/>
  <rect x="56" y="134" width="350" height="200" rx="14" fill="url(#hatchB4)"/>
  <rect x="56" y="134" width="350" height="200" rx="14" fill="none" stroke="#2a78d6" stroke-opacity="0.55" stroke-width="1.5"/>
  <text x="76" y="166" fill="#1c5cab" font-size="16">covered by contracts</text>

  <rect x="424" y="134" width="150" height="200" rx="14" fill="#f7f6f3" stroke="#b5b3ab" stroke-width="1.5" stroke-dasharray="7 6"/>
  <text x="499" y="166" fill="#6f6d67" font-size="15" text-anchor="middle">not covered</text>

  <line x1="416" y1="126" x2="416" y2="342" stroke="#c98500" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- agent path stopping at the boundary -->
  <path d="M 80 294 C 150 270, 190 242, 240 260 S 352 264, 398 236" fill="none" stroke="#52514e" stroke-width="2.2"/>
  <circle cx="406" cy="233" r="11" fill="#c98500" fill-opacity="0.25" filter="url(#glowB4)"/>
  <circle cx="406" cy="233" r="6" fill="#c98500"/>
  <rect x="372" y="180" width="68" height="30" rx="7" fill="#c98500" fill-opacity="0.15" stroke="#c98500" stroke-width="1.5"/>
  <text x="406" y="201" fill="#9a6a00" font-size="14" letter-spacing="1.5" text-anchor="middle">STOP</text>

  <path d="M 406 252 L 406 320" fill="none" stroke="#52514e" stroke-width="1.8" marker-end="url(#arrGreyB4)"/>

  <!-- ledger -->
  <rect x="230" y="326" width="344" height="134" rx="12" fill="#f4f3f0" stroke="#d0cec6" stroke-width="1.5"/>
  <text x="250" y="357" fill="#1a1a19" font-size="16.5">gap ledger</text>
  <g font-family="ui-monospace, Menlo, Consolas, monospace" font-size="15" fill="#52514e">
    <text x="250" y="386">GAP-017: contracts don't cover</text>
    <text x="250" y="408">the error-path helper</text>
  </g>
  <text x="250" y="436" fill="#6f6d67" font-size="14.5">conservative reading · source cited</text>

  <rect x="230" y="478" width="344" height="40" rx="10" fill="#f7f6f3" stroke="#b5b3ab" stroke-width="1.5"/>
  <text x="250" y="504" fill="#6f6d67" font-size="15" font-family="ui-monospace, Menlo, Consolas, monospace">// TEMPLATE-GAP: inlined here</text>

  <line x1="606" y1="100" x2="606" y2="580" stroke="#dddbd3" stroke-width="1.5"/>

  <!-- right: three bins -->
  <text x="640" y="114" fill="#6f6d67" font-size="14" letter-spacing="1.5">EVERY DIVERGENCE LANDS IN ONE BIN</text>

  <rect x="796" y="134" width="200" height="44" rx="22" fill="#f4f3f0" stroke="#a8a69e" stroke-width="1.5"/>
  <text x="896" y="162" fill="#1a1a19" font-size="17" text-anchor="middle">adversarial diff</text>

  <!-- falling divergences -->
  <g>
    <rect x="822" y="200" width="14" height="14" rx="3" transform="rotate(45 829 207)" fill="#a8a69e"/>
    <rect x="762" y="242" width="14" height="14" rx="3" transform="rotate(45 769 249)" fill="#2a78d6"/>
    <rect x="716" y="290" width="14" height="14" rx="3" transform="rotate(45 723 297)" fill="#2a78d6"/>
    <rect x="892" y="214" width="14" height="14" rx="3" transform="rotate(45 899 221)" fill="#a8a69e"/>
    <rect x="896" y="272" width="14" height="14" rx="3" transform="rotate(45 903 279)" fill="#199e70"/>
    <rect x="962" y="204" width="14" height="14" rx="3" transform="rotate(45 969 211)" fill="#a8a69e"/>
    <rect x="1030" y="246" width="14" height="14" rx="3" transform="rotate(45 1037 253)" fill="#d03b3b"/>
    <rect x="1078" y="292" width="14" height="14" rx="3" transform="rotate(45 1085 299)" fill="#d03b3b"/>
  </g>

  <!-- bins -->
  <g stroke-width="2.5" fill="none" stroke-linecap="round">
    <path d="M 636 336 L 636 432 L 791 432 L 791 336" stroke="#2a78d6"/>
    <path d="M 814 336 L 814 432 L 969 432 L 969 336" stroke="#199e70"/>
    <path d="M 992 336 L 992 432 L 1147 432 L 1147 336" stroke="#d03b3b" filter="url(#glowB4)"/>
    <path d="M 992 336 L 992 432 L 1147 432 L 1147 336" stroke="#d03b3b"/>
  </g>
  <g>
    <rect x="688" y="404" width="14" height="14" rx="3" transform="rotate(45 695 411)" fill="#2a78d6"/>
    <rect x="722" y="408" width="14" height="14" rx="3" transform="rotate(45 729 415)" fill="#2a78d6"/>
    <rect x="884" y="406" width="14" height="14" rx="3" transform="rotate(45 891 413)" fill="#199e70"/>
    <rect x="1052" y="404" width="14" height="14" rx="3" transform="rotate(45 1059 411)" fill="#d03b3b"/>
    <rect x="1086" y="408" width="14" height="14" rx="3" transform="rotate(45 1093 415)" fill="#d03b3b"/>
  </g>

  <g text-anchor="middle">
    <text x="713" y="474" fill="#1c5cab" font-size="18">predicted</text>
    <text x="713" y="499" fill="#6f6d67" font-size="14.5">declared up front</text>
    <text x="891" y="474" fill="#0e7d54" font-size="18">catalogued</text>
    <text x="891" y="499" fill="#6f6d67" font-size="14.5">ledger entry GAP-017</text>
    <text x="1069" y="474" fill="#d03b3b" font-size="18">candidate defect</text>
    <text x="1069" y="499" fill="#6f6d67" font-size="14.5">work item with an address</text>
  </g>

  <text x="48" y="638" fill="#52514e" font-size="19.5">Boring, almost bureaucratic — and “the AI generated something weird” becomes a work item with an address.</text>
</svg>
