<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-sans-serif, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <pattern id="dots2" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#222220"/>
    </pattern>
    <filter id="fog" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3987e5"/>
    </marker>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6b6a66" stop-opacity="0.9"/>
      <stop offset="0.5" stop-color="#6b6a66" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#6b6a66" stop-opacity="0.9"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="560" rx="20" fill="#161615"/>
  <rect width="1200" height="560" rx="20" fill="url(#dots2)"/>
  <rect x="0.5" y="0.5" width="1199" height="559" rx="19.5" fill="none" stroke="#ffffff" stroke-opacity="0.08"/>

  <text x="48" y="58" fill="#898781" font-size="13" letter-spacing="3">FIG. 02 — PLAUSIBILITY IS NOT PROVENANCE</text>

  <!-- what we have -->
  <text x="48" y="112" fill="#898781" font-size="12" letter-spacing="2">WHAT WE HAVE</text>

  <rect x="88" y="158" width="170" height="54" rx="10" fill="#1f1f1e" stroke="#6b6a66"/>
  <text x="173" y="191" fill="#eceae4" font-size="15" text-anchor="middle">human intent</text>

  <line x1="262" y1="185" x2="796" y2="185" stroke="url(#fade)" stroke-width="1.6" stroke-dasharray="6 6"/>

  <g filter="url(#fog)">
    <ellipse cx="400" cy="185" rx="70" ry="34" fill="#2c2c2a" fill-opacity="0.75"/>
    <ellipse cx="530" cy="178" rx="80" ry="38" fill="#2c2c2a" fill-opacity="0.75"/>
    <ellipse cx="660" cy="188" rx="70" ry="34" fill="#2c2c2a" fill-opacity="0.75"/>
  </g>
  <g fill="#898781">
    <text x="352" y="180" font-size="17">?</text>
    <text x="432" y="205" font-size="21">?</text>
    <text x="522" y="170" font-size="16">?</text>
    <text x="608" y="198" font-size="20">?</text>
    <text x="692" y="176" font-size="16">?</text>
  </g>

  <rect x="800" y="158" width="180" height="54" rx="10" fill="#1f1f1e" stroke="#6b6a66"/>
  <text x="890" y="191" fill="#eceae4" font-size="15" text-anchor="middle">generated code</text>

  <rect x="800" y="230" width="122" height="30" rx="15" fill="#199e70" fill-opacity="0.14" stroke="#199e70"/>
  <text x="861" y="250" fill="#4cc596" font-size="13" text-anchor="middle">tests pass ✓</text>
  <text x="936" y="250" fill="#898781" font-size="13">— written from the code</text>

  <line x1="48" y1="300" x2="1152" y2="300" stroke="#2c2c2a"/>

  <!-- what control requires -->
  <text x="48" y="344" fill="#898781" font-size="12" letter-spacing="2">WHAT CONTROL REQUIRES</text>

  <g font-size="15" text-anchor="middle">
    <rect x="108" y="372" width="168" height="56" rx="10" fill="#182233" stroke="#3987e5"/>
    <text x="192" y="406" fill="#cfe0f6">requirement</text>

    <line x1="280" y1="400" x2="306" y2="400" stroke="#3987e5" stroke-width="1.8" marker-end="url(#arrBlue)"/>

    <rect x="312" y="372" width="168" height="56" rx="10" fill="#182233" stroke="#3987e5"/>
    <text x="396" y="406" fill="#cfe0f6">architectural rule</text>

    <line x1="484" y1="400" x2="510" y2="400" stroke="#3987e5" stroke-width="1.8" marker-end="url(#arrBlue)"/>

    <rect x="516" y="372" width="168" height="56" rx="10" fill="#182233" stroke="#3987e5"/>
    <text x="600" y="406" fill="#cfe0f6">contract</text>

    <line x1="688" y1="400" x2="714" y2="400" stroke="#3987e5" stroke-width="1.8" marker-end="url(#arrBlue)"/>

    <rect x="720" y="372" width="168" height="56" rx="10" fill="#182233" stroke="#3987e5"/>
    <text x="804" y="406" fill="#cfe0f6">implementation</text>

    <line x1="892" y1="400" x2="918" y2="400" stroke="#3987e5" stroke-width="1.8" marker-end="url(#arrBlue)"/>

    <rect x="924" y="372" width="168" height="56" rx="10" fill="#182233" stroke="#3987e5"/>
    <text x="1008" y="406" fill="#cfe0f6">test</text>
  </g>

  <text x="600" y="486" fill="#c3c2b7" font-size="15" text-anchor="middle">Every element can answer: why do I exist — and which check proves me right.</text>
</svg>
